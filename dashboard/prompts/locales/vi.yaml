  kg_extraction:
    steps_json: |
      ## Quy trình trích xuất đồ thị tri thức định hướng Ontology (Ontology-Driven Knowledge Graph Extraction)

      ### Bước 1: Nhận dạng khái niệm và phân loại ngữ nghĩa
         **a. Phân tích miền hệ thống để xác định các khái niệm:**
         - Khái niệm cấp cao: Tổ chức, hệ thống, khung làm việc, chính sách
         - Khái niệm cấp trung: Quy trình, sự kiện, dự án, hoạt động
         - Các thực thể cấp phiên bản: Con người cụ thể, địa điểm, mốc thời gian, phép đo

         **b. Cấu trúc ngữ nghĩa cho mỗi khái niệm:**
         - `name`: Định danh chuẩn (Sử dụng Title Case - Viết Hoa Chữ Cái Đầu Mỗi Từ cho các thực thể được đặt tên)
         - `type`: Phân loại lớp Ontology theo phân loại miền
         - `description`: Định nghĩa ngữ nghĩa bao gồm:
           * Thuộc tính nội tại (đặc điểm, tính chất)
           * Vai trò chức năng và mục đích trong miền
           * Ranh giới ngữ cảnh (phạm vi thời gian, không gian, tổ chức)
           * Các thuộc tính định lượng và chỉ số (đối với các khái niệm có thể đo lường)

      ### Bước 2: Trích xuất quan hệ ngữ nghĩa và xây dựng Ontology
         **a. Phân tích quan hệ ngữ nghĩa đa chiều:**
         - Quan hệ phân loại: subClassOf (là một), instanceOf
         - Quan hệ thành phần: hasPart (có phần), partOf (là một phần của - cấu trúc mereological)
         - Quan hệ liên kết: associatedWith (liên kết với), relatedTo (liên quan đến), influences (ảnh hưởng)
         - Quan hệ chức năng: performs (thực hiện), produces (tạo ra), consumes (tiêu thụ), controls (kiểm soát)
         - Quan hệ thời gian: precedes (đứng trước), follows (đứng sau), co-occurs (đồng thời), during (trong khi)
         - Quan hệ nhân quả: causes (gây ra), enables (cho phép), prevents (ngăn chặn), affects (tác động)

         **b. Đặc tả thuộc tính đối tượng:**
         - `source`: Thực thể nguồn (chủ thể của quan hệ, phải khớp chính xác với tên thực thể)
         - `target`: Thực thể đích (đối tượng của quan hệ, phải khớp chính xác với tên thực thể)
         - `relation`: Vị từ ngữ nghĩa (cụm động từ đại diện cho thuộc tính)
         - `description`: Ngữ nghĩa quan hệ chính thức bao gồm:
           * Giải thích ngữ nghĩa và ý nghĩa logic
           * Các ràng buộc ngữ cảnh và điều kiện áp dụng
           * Tính bản số/Cardinality (một-một, một-nhiều, nhiều-nhiều)
           * Độ mạnh của mối quan hệ và mức độ tin cậy

      ### Bước 3: Xác thực Ontology và chuẩn bị suy luận
         **a. Xác minh tính mạch lạc ngữ nghĩa:**
         - Đảm bảo mỗi khái niệm tham gia vào ít nhất một quan hệ ngữ nghĩa
         - Xây dựng các chuỗi quan hệ bắc cầu cho phép suy luận đa bước
         - Loại bỏ các khái niệm mồ côi (khái niệm không có mối quan hệ)
         - Xác minh các ràng buộc miền-phạm vi cho tất cả các quan hệ

         **b. Biểu diễn tri thức có cấu trúc:**
         - Tuân thủ cấu trúc tương thích JSON-LD tiêu chuẩn
         - Ngôn ngữ trích xuất: {language}
         - Tổ chức các khái niệm theo thứ bậc từ tổng quát đến cụ thể
         - Duy trì tính nhất quán ngữ nghĩa và sự đồng nhất về thuật ngữ trong toàn bộ đầu ra
    
    example_json: |
      ## Ví dụ trích xuất tri thức Ontology trong lĩnh vực Tài chính:

      ```json
        {
          "entities": [
            {
              "name": "Global Tech Bank",
              "type": "FinancialInstitution",
              "description": "Tổ chức ngân hàng thương mại với tổng tài sản 85 tỷ USD, tuyển dụng 18.000 nhân viên tại 500 chi nhánh ở nhiều khu vực pháp lý"
            },
            {
              "name": "Fintech Innovations Inc",
              "type": "TechnologyVendor",
              "description": "Công ty công nghệ tài chính chuyên về cơ sở hạ tầng thanh toán kỹ thuật số và phân tích tài chính dựa trên AI, thành lập năm 2020, đội ngũ 200 người, vốn huy động 50 triệu USD"
            }
          ],
          "relationships": [
            {
              "source": "Global Tech Bank",
              "target": "Fintech Innovations Inc",
              "relation": "hasStrategicPartnershipWith",
              "description": "Thỏa thuận hợp tác chính thức để cùng phát triển nền tảng ngân hàng kỹ thuật số thế hệ mới, bao gồm khoản đầu tư 30 triệu USD và các thỏa thuận chia sẻ dữ liệu song phương"
            }
          ]
        }
      ```

      **Lưu ý**: Ví dụ này minh họa việc trích xuất hợp lý về mặt ontology với các khái niệm được định nghĩa chính thức, các gán loại chính xác về ngữ nghĩa và các thuộc tính mối quan hệ có cấu trúc hỗ trợ suy luận và suy diễn tự động. Biểu diễn tuân theo các thực hành tốt nhất về kỹ thuật ontology để đảm bảo tính nhất quán và khả năng tính toán.
    
    output_format_template: |
      ## Định dạng trích xuất Ontology tiêu chuẩn:
      ```json
      {{
      "entities": [
        {{
          "name": "Định danh thực thể chuẩn (Sử dụng Title Case cho danh từ riêng)",
          "type": "Nhãn lớp Ontology (Sử dụng CamelCase không có dấu cách)",
          "description": "Định nghĩa ngữ nghĩa chính thức với các thuộc tính thiết yếu và ngữ cảnh miền"
        }}
      ],
      "relationships": [
        {{
          "source": "Tên thực thể nguồn (phải khớp chính xác với tên thực thể, có phân biệt chữ hoa chữ thường)",
          "target": "Tên thực thể đích (phải khớp chính xác với tên thực thể, có phân biệt chữ hoa chữ thường)",
          "relation": "Nhãn vị từ ngữ nghĩa (Sử dụng cụm động từ camelCase)",
          "description": "Đặc điểm ngữ nghĩa chính xác của quan hệ bao gồm tính số lượng, các ràng buộc và bằng chứng định lượng"
        }}
      ]
      }}
      ```

      ### Tiêu chí chất lượng Ontology:

      **Tính đầy đủ về ngữ nghĩa:**
      - Trích xuất tối đa các khái niệm và quan hệ có ý nghĩa trong khi tránh nhiễu ngữ nghĩa
      - Tối thiểu 2 thực thể được định nghĩa rõ ràng và 1 mối quan hệ hợp lệ về mặt ngữ nghĩa cho mỗi đơn vị tri thức
      - Độ chi tiết nội dung tối thiểu: 50 ký tự thông tin thực chất

      **Độ chính xác về thuật ngữ:**
      - Định danh thực thể phải chuẩn xác và không mơ hồ (tránh đại từ mơ hồ: "nó", "điều này", "cái đó", "họ", "chúng")
      - Nhãn loại nên phản ánh các lớp ontology miền (quy ước CamelCase)
      - Các vị từ quan hệ nên là các cụm động từ nguyên tử về ngữ nghĩa (ví dụ: "tuyểnDụng", "cóQuanHệĐốiTácVới", "sảnXuất")

      **Các ràng buộc hình thức:**
      - Việc khớp tên thực thể phải chính xác và phân biệt chữ hoa chữ thường trong tất cả các tham chiếu
      - Bao gồm các mốc thời gian (ngày tháng, thời lượng), các phép đo định lượng (số lượng, số tiền) và các thuộc tính kích thước
      - Mô tả phải cung cấp nội dung ngữ nghĩa thực chất (tối thiểu 20 ký tự)
      - Các đặc điểm mối quan hệ nên chính xác nhưng súc tích (mục tiêu: tối đa 15 từ, nắm bắt ngữ nghĩa thiết yếu)

      **Tính toàn vẹn tri thức:**
      - Loại bỏ các đơn vị tri thức trùng lặp hoặc gần trùng lặp
      - Mỗi đơn vị tri thức phải có ngữ cảnh tự thân và có thể giải thích độc lập
      - Đảm bảo tính toàn vẹn tham chiếu: tất cả các thực thể nguồn/đích phải được định nghĩa trong mảng thực thể
      - Duy trì tính nhất quán về phân loại: các khái niệm anh em nên ở mức độ trừu tượng tương đương

      ## Dữ liệu thực tế
      ```
      {text}
      ```
      Tạo thực thể và mối quan hệ trong khối Markdown
    
    domain_format: |
      ## Tài liệu {language}:
      {knowledge_format}
      {example}
    
    extraction_steps: |
      Thực hiện các bước sau để trích xuất các thực thể và mối quan hệ:
      ## 1. Trích xuất thực thể:
         a. Nhận dạng tất cả các thực thể trong Miền hiện tại:
         b. Với mỗi thực thể, trích xuất thông tin sau:
            - entity_name: Tên của thực thể, viết hoa
            - entity_type: Loại miền
            - entity_information: duy trì thông tin chi tiết về các thuộc tính chỉ số, giá trị của thực thể về miền đó
         c. Định dạng mỗi thực thể như sau: ("entity"$$$$<entity_name>$$$$<entity_type>$$$$<entity_information>)

      ## 2. Trích xuất mối quan hệ:
         a. Nhận dạng các cặp thực thể có liên quan rõ ràng với nhau.
         b. Với mỗi cặp thực thể có liên quan, trích xuất thông tin sau:
            - source_entity: Tên của thực thể nguồn
            - target_entity: Tên của thực thể đích
            - relation: Mối quan hệ giữa thực thể nguồn và thực thể đích
            - relationship_description: Trích xuất thông tin về cách các thực thể liên quan, tập trung vào vấn đề, giải pháp hoặc tác động
         c. Định dạng mỗi mối quan hệ như sau: ("relationship"$$$$<source_entity>$$$$<target_entity>$$$$<relation>$$$$<relationship_description>)

      ## 3. Định dạng đầu ra: để phân tích đồ thị
         a. Chỉ trả về phản hồi của bạn về các thực thể-mối quan hệ trong ví dụ Markdown
         b. Các thực thể, mối quan hệ được trích xuất bằng {language}
    
    triplet_extract_tmpl: |
      {goal}

      {system_role}

      ## Hướng dẫn về thực thể:
      1. Tên thực thể nên được viết hoa và nhất quán
      2. Loại thực thể nên khớp với thuật ngữ chuyên môn của miền
      3. Thông tin thực thể nên bao gồm các chỉ số và giá trị cụ thể cho miền đó

      ## Hướng dẫn về mối quan hệ:
      1. Các mối quan hệ nên có hướng và có ý nghĩa
      2. Mô tả mối quan hệ nên tập trung vào các tác động có thể định lượng được
      3. Bao gồm các khía cạnh thời gian khi có liên quan
      {extraction_steps}
    
    goal: |
      -Mục tiêu-
      Bạn là một chuyên gia AI về trích xuất tri thức, được giao nhiệm vụ phân tích tài liệu chuyên ngành để trích xuất chính xác các thực thể và mối quan hệ ngữ nghĩa. Mục tiêu của bạn là xác định tất cả các thực thể có liên quan, loại của chúng và mối quan hệ giữa chúng. Đặc biệt chú ý đến thực thể trong thực tế và các sự kiện liên quan đến vấn đề, giải pháp hoặc tác động.
    
    system_role: |
      Bạn là một chuyên gia xây dựng đồ thị tri thức theo miền. Vai trò của bạn là:
      1. Tuân theo nguyên lý kim tự tháp để hiểu cái nhìn tổng thể/chi tiết về ngữ cảnh và thuật ngữ của miền cụ thể
      2. Xác định các thực thể chính và mối quan hệ của chúng trong miền
      3. Duy trì tính nhất quán trong việc đặt tên thực thể và các loại mối quan hệ
      4. Đảm bảo thông tin trích xuất chính xác và có liên quan
      5. Tuân theo định dạng tri thức chuyên biệt cho miền được cung cấp

