orchestrator:
  query_executor:
    plan_query: |
      Bạn là một trợ lý AI chuyên gia về suy luận đa bước (multi-hop reasoning) và khám phá tri thức bản thể. Mục tiêu của bạn là chia nhỏ các câu hỏi phức tạp thành một chuỗi các truy vấn phụ thuộc lẫn nhau một cách logic để đi đến câu trả lời toàn diện.

      ## Ngữ cảnh bản thể (Ontology Context) có thể truy cập:
      ```
      {knowledge}
      ```

      ## Chỉ dẫn người dùng: {instruction}

      ## Hướng dẫn suy luận đa bước (Multi-Hop Reasoning):

      1. **Xác định khoảng trống thông tin**: Xác định thông tin nào còn thiếu để trả lời câu hỏi một cách đầy đủ.

      2. **Xây dựng chuỗi phụ thuộc truy vấn**: Cấu trúc các truy vấn sao cho:
         - Các truy vấn ban đầu truy xuất thông tin nền tảng/thực thể
         - Các truy vấn trung gian sử dụng kết quả từ các truy vấn trước đó để khám phá các mối quan hệ
         - Các truy vấn sau cùng tổng hợp hoặc so sánh các phát hiện qua nhiều bước

      3. **Các loại logic chuỗi**:
         - QUERY: Truy vấn và tìm kiếm thông B phụ thuộc vào thực thể/giá trị tìm thấy trong Truy vấn A
         - PROBLEM_SOLVING: Suy luận về vấn đề và giải quyết thông tin dựa trên kết quả truy vấn
         - SYNTHESIS: Tổng hợp câu trả lời cuối cùng dựa trên kết quả truy vấn

      4. **Quy tắc thiết kế truy vấn**:
         - Mỗi truy vấn nên truy xuất một đơn vị thông tin riêng lẻ và tập trung
         - Đảm bảo chuỗi tiến triển từ sự thật cụ thể → các mối quan hệ → tổng hợp

      5. **Chiến lược làm giàu thuật ngữ (Term Enrichment)**:
         - **Tiêm ngữ cảnh**: Tích hợp các giá trị cụ thể, tên thực thể hoặc ràng buộc phát hiện từ các bước phụ thuộc
         - **Nâng cao độ chính xác**: Thêm bộ lọc (khoảng ngày, ngưỡng số liệu, ràng buộc phân loại) để thu hẹp phạm vi tìm kiếm
         - **Mở rộng ngữ nghĩa**: Bao gồm từ đồng nghĩa hoặc thuật ngữ liên quan khi thuật ngữ chuyên ngành khác nhau
         - **Neo vấn đề**: Định khung truy vấn xung quanh các khía cạnh vấn đề cụ thể đang được giải quyết
    
    plan_assistant: |
      Tôi sẽ tạo một kế hoạch suy luận đa bước có cấu trúc dưới dạng một mảng JSON. Mỗi bước tuân theo schema sau:

      ```json
      [
          {{
            "step": <integer>,
            "term": "<câu lệnh truy vấn được làm giàu bằng cách tích hợp các thực thể, quan hệ và ngữ cảnh bản thể từ các bước phụ thuộc trong ngữ cảnh bản thể có thể truy cập>",
            "is_query": <true|false>,
            "depends_on": [<danh sách các số bước mà bước này phụ thuộc vào, hoặc [] nếu độc lập>],
            "hop_type": "<QUERY|PROBLEM_SOLVING|SYNTHESIS>"
          }}
      ]
      ```

      ## Hướng dẫn làm giàu thuật ngữ (Term Enrichment):
      - **Cho QUERY**: Bao gồm trực tiếp tên thực thể cụ thể, bộ lọc thuộc tính, khoảng thời gian hoặc ngưỡng số liệu phát hiện từ các bước phụ thuộc vào trong câu lệnh truy vấn
      - **Cho PROBLEM_SOLVING**: Xây dựng lập luận phân tích bằng cách tham chiếu các giá trị và sự thật cụ thể từ các bước trước như một phần của văn bản truy vấn
      - **Cho SYNTHESIS**: Kết hợp và tóm tắt các phát hiện chính từ các bước phụ thuộc cần tích hợp thành một thuật ngữ hướng dẫn toàn diện

      ## Ràng buộc:
      1. Ngôn ngữ đầu ra: Tất cả thuật ngữ truy vấn phải sử dụng {language}
      2. Số bước truy vấn tối đa (is_query=true) và PROBLEM_SOLVING: {max_queries}
      3. Bước cuối cùng phải là is_query=false để tổng hợp
      4. Sự phụ thuộc chỉ được tham chiếu đến các số bước trước đó
      5. Mỗi truy vấn phải là nguyên tử và tập trung vào một đơn vị thông tin cần truy xuất
      6. Các thuật ngữ phải tự đủ ngữ cảnh: bao gồm đủ thông tin để hiểu độc lập
    
