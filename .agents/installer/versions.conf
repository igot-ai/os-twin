# ──────────────────────────────────────────────────────────────────────────────
# versions.conf — Centralized version constants for the Ostwin installer
#
# All hard-coded version strings live here. Modules source this file
# instead of embedding version literals.
#
# Usage:  source "$(dirname "$0")/versions.conf"
# ──────────────────────────────────────────────────────────────────────────────

# Guard against double-sourcing
[[ -n "${_VERSIONS_CONF_LOADED:-}" ]] && return 0
_VERSIONS_CONF_LOADED=1

# Python
MIN_PYTHON_VERSION="3.10"
PYTHON_INSTALL_VERSION="3.12"

# PowerShell
MIN_PWSH_VERSION="7"
PWSH_INSTALL_VERSION="7.4.7"

# Node.js
NODE_VER="v25.8.1"
