rules:
  - id: cors-allow-all-origins
    patterns:
      - pattern: CORSMiddleware(..., allow_origins=["*"], ...)
    message: >
      CORSMiddleware configured with allow_origins=["*"]. Combined with
      cookie-based authentication, this enables cross-origin credential theft
      and drive-by exploitation from any website (CWE-346).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-346
      category: security
      technology: [fastapi]

  - id: cors-allow-credentials-with-wildcard
    patterns:
      - pattern: CORSMiddleware(..., allow_origins=["*"], ..., allow_credentials=True, ...)
    message: >
      CRITICAL: CORSMiddleware with wildcard origin AND allow_credentials=True.
      Browsers will expose cookies/auth headers to any origin (CWE-346).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-346
      category: security
