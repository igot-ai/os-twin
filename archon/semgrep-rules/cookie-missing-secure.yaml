rules:
  - id: cookie-missing-secure-flag
    patterns:
      - pattern: $RESP.set_cookie(..., httponly=True, ...)
      - pattern-not: $RESP.set_cookie(..., secure=True, ...)
    message: >
      Cookie set without secure=True flag. The cookie will be transmitted over
      plain HTTP connections, enabling network interception of session tokens (CWE-614).
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-614
      category: security

  - id: cookie-missing-secure-flag-alt
    patterns:
      - pattern: $RESP.set_cookie($KEY, $VALUE, ...)
      - pattern-not: $RESP.set_cookie(..., secure=True, ...)
      - pattern-not: $RESP.set_cookie(..., secure=$VAL, ...)
    message: >
      Cookie '$KEY' set without explicit secure=True. Without this flag the
      session cookie travels in plaintext over HTTP (CWE-614).
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-614
      category: security
