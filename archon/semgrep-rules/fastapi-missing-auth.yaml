rules:
  - id: fastapi-route-missing-auth-dependency
    patterns:
      - pattern: |
          @$ROUTER.$METHOD(...)
          async def $FUNC(...):
              ...
      - pattern-not: |
          @$ROUTER.$METHOD(...)
          async def $FUNC(..., $USER: $TYPE = Depends(get_current_user), ...):
              ...
      - pattern-not: |
          @$ROUTER.$METHOD(...)
          async def $FUNC(..., $USER: dict = Depends($AUTH), ...):
              ...
      - metavariable-regex:
          metavariable: $METHOD
          regex: ^(get|post|put|patch|delete)$
    message: >
      FastAPI route handler '$FUNC' does not use Depends(get_current_user) for
      authentication. If this endpoint accesses sensitive data or performs
      state-changing operations, it is publicly accessible (CWE-306).
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-306
      category: security
      technology: [fastapi]

  - id: fastapi-route-missing-auth-subprocess
    patterns:
      - pattern: |
          @$ROUTER.$METHOD(...)
          async def $FUNC(...):
              ...
              subprocess.$CALL(...)
              ...
      - pattern-not: |
          @$ROUTER.$METHOD(...)
          async def $FUNC(..., $USER = Depends(...), ...):
              ...
    message: >
      FastAPI route '$FUNC' spawns a subprocess without an authentication
      dependency. This is a critical unauthenticated code execution risk (CWE-306, CWE-78).
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-306
      category: security
      technology: [fastapi]
