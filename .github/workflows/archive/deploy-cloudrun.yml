# ──────────────────────────────────────────────────────────────────────────────
# Agent OS — GCP Cloud Run Deployment
#
# Continuous deployment pipeline that builds a Docker container and
# deploys it to Google Cloud Run whenever code is pushed to 'main'.
#
# Requirements (GitHub Secrets/Variables):
#   - GCP_PROJECT_ID: Your Google Cloud Project ID
#   - GCP_REGION: Preferred region (e.g., us-central1)
#   - WIF_PROVIDER: Workload Identity Federation provider string
#   - GCP_SERVICE_ACCOUNT: Service account email to use for deployment
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: os-twin-dashboard
  REPOSITORY: ostwin-repo

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Use Workload Identity Federation for more secure authentication
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        id: build-image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.build-image.outputs.image }}
          # Recommended: use --allow-unauthenticated for public dashboards
          # or remove this flag for private internal tools
          flags: '--allow-unauthenticated --memory=1Gi --cpu=1'

      - name: Show Deployment URL
        run: |
          echo "::notice::Successfully deployed to ${{ steps.deploy.outputs.url }}"
