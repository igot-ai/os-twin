<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" width="100%" height="100%">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; }

      .bg { fill: #0f172a; }
      .border { fill: none; stroke: #1e293b; stroke-width: 1; }

      .box { fill: #1e293b; stroke-width: 2; }
      .box-blue { stroke: #38bdf8; }
      .box-purple { stroke: #a855f7; }
      .box-text { fill: #f8fafc; font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }

      .step { fill: #38bdf8; }
      .step-p { fill: #a855f7; }
      .step-num { fill: #0f172a; font-size: 9px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; letter-spacing: 0.5px; }

      .arrow { stroke: #38bdf8; stroke-width: 2; fill: none; stroke-linecap: round; }
      .arrow-p { stroke: #a855f7; stroke-width: 2; fill: none; stroke-linecap: round; }

      .desc { fill: #94a3b8; font-size: 11px; text-anchor: middle; }
      .desc-b { fill: #e2e8f0; font-size: 11px; font-weight: 600; text-anchor: middle; }

      .title { fill: #f8fafc; font-size: 16px; font-weight: 700; text-anchor: middle; }
      .subtitle { fill: #38bdf8; font-size: 13px; font-weight: 500; text-anchor: middle; }

      .fb { stroke: #475569; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
      .fb-label { fill: #64748b; font-size: 10px; text-anchor: middle; font-style: italic; }

      .fade-in { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
      .draw { stroke-dasharray: 78; stroke-dashoffset: 78; animation: draw 0.45s ease-out forwards; }
      .packet { opacity: 0; animation: travel 0.5s ease-in-out forwards; }
      .packet-p { opacity: 0; animation: travelP 0.5s ease-in-out forwards; }
      .box-glow { opacity: 0; animation: glowPulse 0.8s ease-out forwards; }
      .box-glow-p { opacity: 0; animation: glowPulseP 0.8s ease-out forwards; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes travel {
        0%   { opacity: 0; transform: translateX(0); }
        10%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { opacity: 0; transform: translateX(72px); }
      }
      @keyframes travelP {
        0%   { opacity: 0; transform: translateX(0); }
        10%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { opacity: 0; transform: translateX(72px); }
      }
      @keyframes glowPulse {
        0%   { opacity: 0.4; }
        100% { opacity: 0; }
      }
      @keyframes glowPulseP {
        0%   { opacity: 0.4; }
        100% { opacity: 0; }
      }
      @keyframes feedbackDraw {
        from { stroke-dashoffset: 1200; }
        to   { stroke-dashoffset: 0; }
      }

      .t0  { animation-delay: 0.1s; }
      .t1  { animation-delay: 0.6s; }
      .t1d { animation-delay: 0.6s; }
      .t1a { animation-delay: 1.1s; }
      .t1p { animation-delay: 1.2s; }

      .t2  { animation-delay: 1.7s; }
      .t2d { animation-delay: 1.7s; }
      .t2g { animation-delay: 1.65s; }
      .t2a { animation-delay: 2.2s; }
      .t2p { animation-delay: 2.3s; }

      .t3  { animation-delay: 2.8s; }
      .t3d { animation-delay: 2.8s; }
      .t3g { animation-delay: 2.75s; }
      .t3a { animation-delay: 3.3s; }
      .t3p { animation-delay: 3.4s; }

      .t4  { animation-delay: 3.9s; }
      .t4d { animation-delay: 3.9s; }
      .t4g { animation-delay: 3.85s; }
      .t4a { animation-delay: 4.4s; }
      .t4p { animation-delay: 4.5s; }

      .t5  { animation-delay: 5.0s; }
      .t5d { animation-delay: 5.0s; }
      .t5g { animation-delay: 4.95s; }

      .t6  { animation-delay: 5.6s; }

      .fb-draw { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: feedbackDraw 1.5s ease-out forwards; }
    </style>

    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8" />
    </marker>
    <marker id="ahp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7" />
    </marker>
    <marker id="ahg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="12" class="bg" />
  <rect x="0.5" y="0.5" width="99.9%" height="99.9%" rx="12" class="border" />

  <!-- Title -->
  <g class="fade-in t0">
    <text x="550" y="34" class="title">OSTwin: Markdown Plan → Orchestrated Multi-Agent Execution</text>
    <text x="550" y="54" class="subtitle">No custom agent code required.</text>
  </g>

  <!-- ═══════════ STAGE 1: PLAN.md ═══════════ -->
  <g class="fade-in t1">
    <rect x="95" y="76" width="50" height="16" rx="3" class="step" />
    <text x="120" y="85" class="step-num">STEP 1</text>
    <rect x="50" y="98" width="140" height="48" rx="10" class="box box-blue" />
    <text x="120" y="124" class="box-text">PLAN.md</text>
  </g>
  <g class="fade-in t1d">
    <text x="120" y="168" class="desc" style="font-style: italic;">"Build a game"</text>
    <text x="120" y="184" class="desc-b">Goal + Epics</text>
    <text x="120" y="200" class="desc">+ Constraints</text>
  </g>

  <!-- Arrow 1→2 + data packet -->
  <line x1="194" y1="122" x2="268" y2="122" class="arrow draw t1a" marker-end="url(#ah)" />
  <circle cx="194" cy="122" r="4" fill="#38bdf8" filter="url(#glow)" class="packet t1p" />

  <!-- ═══════════ STAGE 2: Engine ═══════════ -->
  <rect x="266" y="94" width="148" height="56" rx="12" fill="#38bdf8" opacity="0" class="box-glow t2g" />
  <g class="fade-in t2">
    <rect x="315" y="76" width="50" height="16" rx="3" class="step" />
    <text x="340" y="85" class="step-num">STEP 2</text>
    <rect x="270" y="98" width="140" height="48" rx="10" class="box box-blue" />
    <text x="340" y="124" class="box-text">Engine</text>
  </g>
  <g class="fade-in t2d">
    <text x="340" y="168" class="desc-b">Parses plan</text>
    <text x="340" y="184" class="desc">Orchestrates flow</text>
  </g>

  <!-- Arrow 2→3 + data packet -->
  <line x1="414" y1="122" x2="488" y2="122" class="arrow draw t2a" marker-end="url(#ah)" />
  <circle cx="414" cy="122" r="4" fill="#38bdf8" filter="url(#glow)" class="packet t2p" />

  <!-- ═══════════ STAGE 3: DAG ═══════════ -->
  <rect x="486" y="94" width="148" height="56" rx="12" fill="#38bdf8" opacity="0" class="box-glow t3g" />
  <g class="fade-in t3">
    <rect x="535" y="76" width="50" height="16" rx="3" class="step" />
    <text x="560" y="85" class="step-num">STEP 3</text>
    <rect x="490" y="98" width="140" height="48" rx="10" class="box box-blue" />
    <text x="560" y="124" class="box-text">DAG</text>
  </g>
  <g class="fade-in t3d">
    <text x="560" y="168" class="desc-b">Waves of epics</text>
    <text x="560" y="184" class="desc">Dependency resolution</text>
  </g>

  <!-- Arrow 3→4 + data packet -->
  <line x1="634" y1="122" x2="708" y2="122" class="arrow draw t3a" marker-end="url(#ah)" />
  <circle cx="634" cy="122" r="4" fill="#38bdf8" filter="url(#glow)" class="packet t3p" />

  <!-- ═══════════ STAGE 4: War-Rooms ═══════════ -->
  <rect x="706" y="94" width="148" height="56" rx="12" fill="#38bdf8" opacity="0" class="box-glow t4g" />
  <g class="fade-in t4">
    <rect x="755" y="76" width="50" height="16" rx="3" class="step" />
    <text x="780" y="85" class="step-num">STEP 4</text>
    <rect x="710" y="98" width="140" height="48" rx="10" class="box box-blue" />
    <text x="780" y="124" class="box-text">War-Rooms</text>
  </g>
  <g class="fade-in t4d">
    <text x="780" y="168" class="desc">Channels · Memory</text>
    <text x="780" y="184" class="desc">Lifecycle</text>
    <text x="780" y="200" class="desc-b">Isolated execution</text>
  </g>

  <!-- Arrow 4→5 (purple transition) + data packet -->
  <line x1="854" y1="122" x2="928" y2="122" class="arrow-p draw t4a" marker-end="url(#ahp)" />
  <circle cx="854" cy="122" r="4" fill="#a855f7" filter="url(#glow)" class="packet-p t4p" />

  <!-- ═══════════ STAGE 5: Agents ═══════════ -->
  <rect x="926" y="94" width="148" height="56" rx="12" fill="#a855f7" opacity="0" class="box-glow-p t5g" />
  <g class="fade-in t5">
    <rect x="975" y="76" width="50" height="16" rx="3" class="step-p" />
    <text x="1000" y="85" class="step-num">STEP 5</text>
    <rect x="930" y="98" width="140" height="48" rx="10" class="box box-purple" />
    <text x="1000" y="124" class="box-text">Agents</text>
  </g>
  <g class="fade-in t5d">
    <text x="1000" y="168" class="desc">Skills · MCP Tools</text>
    <text x="1000" y="184" class="desc-b" style="fill: #d8b4fe;">Role-based specialists</text>
  </g>

  <!-- ═══════════ FEEDBACK LOOP ═══════════ -->
  <g class="fade-in t6">
    <path d="M970,150 C970,310 340,310 340,150" class="fb fb-draw" marker-end="url(#ahg)" />
    <text x="655" y="290" class="fb-label">Progress monitoring &amp; wave control</text>
    <text x="655" y="305" class="fb-label">feeds back to Engine</text>
  </g>
</svg>
