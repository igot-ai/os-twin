<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      text { font-family: 'Inter', system-ui, sans-serif; }
      .bg { fill: #0f172a; rx: 12px; }
      .box { fill: #1e293b; stroke: #38bdf8; stroke-width: 2; rx: 8px; }
      .box-text { fill: #f8fafc; font-size: 15px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; }
      .arrow-head { fill: #334155; }
      .arrow-animated { stroke: #38bdf8; stroke-width: 2; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; }
      .arrow-animated-purple { stroke: #a855f7; stroke-width: 2; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; }
      .desc-text { fill: #94a3b8; font-size: 14px; text-anchor: middle; }
      .desc-hl { fill: #e2e8f0; font-weight: 500; }
      .title { fill: #f8fafc; font-size: 18px; font-weight: 600; text-anchor: middle; }
      .subtitle { fill: #38bdf8; font-size: 15px; font-weight: 500; text-anchor: middle; }
      
      .fade-in { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
      .draw-line { animation: drawLine 0.6s linear forwards; }
      .packet { fill: #38bdf8; opacity: 0; animation: pulsePacket 1.5s infinite; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes pulsePacket {
        0% { transform: translateX(0); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateX(50px); opacity: 0; }
      }

      .d-1 { animation-delay: 0.2s; }
      .d-2 { animation-delay: 0.8s; }
      .d-3 { animation-delay: 1.4s; }
      .d-4 { animation-delay: 2.0s; }
      .d-5 { animation-delay: 2.6s; }
      .d-6 { animation-delay: 3.2s; }
      .d-7 { animation-delay: 3.8s; }
      .d-8 { animation-delay: 4.4s; }
      .d-9 { animation-delay: 5.0s; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
    <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g class="fade-in d-1">
    <text x="500" y="45" class="title">OSTwin turns a markdown plan into a fully-orchestrated multi-agent execution.</text>
    <text x="500" y="70" class="subtitle">No custom agent code required.</text>
  </g>

  <g class="fade-in d-1" transform="translate(100, 110)">
    <rect x="-70" y="0" width="140" height="40" class="box" />
    <text x="0" y="21" class="box-text">PLAN.md</text>
  </g>
  
  <g class="fade-in d-1">
    <line x1="100" y1="150" x2="100" y2="200" class="arrow-animated draw-line d-2" marker-end="url(#arrowhead-active)" />
    <text x="100" y="225" class="desc-text" style="font-style: italic;">"Build a game"</text>
    <text x="100" y="250" class="desc-text desc-hl">Goal + Epics</text>
    <text x="100" y="270" class="desc-text">+ Constraints</text>
  </g>

  <line x1="170" y1="130" x2="220" y2="130" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="170" y1="130" x2="220" y2="130" class="arrow-animated draw-line d-2" marker-end="url(#arrowhead-active)" />
  <circle cx="170" cy="130" r="4" class="packet d-3" />

  <g class="fade-in d-3" transform="translate(300, 110)">
    <rect x="-70" y="0" width="140" height="40" class="box" />
    <text x="0" y="21" class="box-text">Engine</text>
  </g>

  <line x1="370" y1="130" x2="420" y2="130" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="370" y1="130" x2="420" y2="130" class="arrow-animated draw-line d-4" marker-end="url(#arrowhead-active)" />
  <circle cx="370" cy="130" r="4" class="packet d-5" />

  <g class="fade-in d-5" transform="translate(500, 110)">
    <rect x="-70" y="0" width="140" height="40" class="box" />
    <text x="0" y="21" class="box-text">DAG</text>
  </g>

  <g class="fade-in d-5">
    <line x1="500" y1="150" x2="500" y2="200" class="arrow-animated draw-line d-6" marker-end="url(#arrowhead-active)" />
    <text x="500" y="225" class="desc-text desc-hl">Waves of epics</text>
    <text x="500" y="250" class="desc-text">Dependency</text>
    <text x="500" y="270" class="desc-text">resolution</text>
  </g>

  <line x1="570" y1="130" x2="620" y2="130" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="570" y1="130" x2="620" y2="130" class="arrow-animated draw-line d-6" marker-end="url(#arrowhead-active)" />
  <circle cx="570" cy="130" r="4" class="packet d-7" />

  <g class="fade-in d-7" transform="translate(700, 110)">
    <rect x="-70" y="0" width="140" height="40" class="box" />
    <text x="0" y="21" class="box-text">War-Rooms</text>
  </g>

  <g class="fade-in d-7">
    <line x1="700" y1="150" x2="700" y2="200" class="arrow-animated draw-line d-8" marker-end="url(#arrowhead-active)" />
    <text x="700" y="225" class="desc-text">Channels</text>
    <text x="700" y="245" class="desc-text">Memory</text>
    <text x="700" y="265" class="desc-text">Lifecycle</text>
    <text x="700" y="290" class="desc-text desc-hl">Isolated execution</text>
  </g>

  <line x1="770" y1="130" x2="820" y2="130" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="770" y1="130" x2="820" y2="130" class="arrow-animated draw-line d-8" marker-end="url(#arrowhead-active)" />
  <circle cx="770" cy="130" r="4" class="packet d-9" />

  <g class="fade-in d-9" transform="translate(900, 110)">
    <rect x="-70" y="0" width="140" height="40" class="box" style="stroke: #a855f7;" />
    <text x="0" y="21" class="box-text">Agents</text>
  </g>

  <g class="fade-in d-9">
    <line x1="900" y1="150" x2="900" y2="200" class="arrow-animated-purple draw-line d-9" marker-end="url(#arrowhead-purple)" />
    <text x="900" y="225" class="desc-text">Skills</text>
    <text x="900" y="245" class="desc-text">MCP Tools</text>
    <text x="900" y="270" class="desc-text desc-hl" style="fill: #d8b4fe;">Role-based</text>
    <text x="900" y="290" class="desc-text desc-hl" style="fill: #d8b4fe;">specialists</text>
  </g>
</svg>
